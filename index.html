<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>RUN & EAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #f0f0f0; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding-bottom: 100px; }

    #header { background: linear-gradient(135deg, #111, #1a1a2e); border-bottom: 3px solid #ffd700; padding: 18px 20px 14px; }
    #header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 4px; color: #ffd700; line-height: 1; }
    #header p { font-size: 12px; color: #888; margin-top: 2px; }

    #main { max-width: 480px; margin: 0 auto; padding: 0 16px; }

    #km-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255,215,0,0.27); border-radius: 16px; padding: 24px 20px; margin-top: 20px; position: relative; overflow: hidden; }
    #km-card::after { content:''; position:absolute; top:-20px; right:-20px; width:120px; height:120px; background: radial-gradient(circle, rgba(255,215,0,0.13), transparent); border-radius: 50%; }
    #km-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    #km-display { display: flex; align-items: baseline; gap: 8px; }
    #km-num { font-family:'Bebas Neue',sans-serif; font-size: 72px; color: #ffd700; line-height: 1; }
    #km-unit { font-family:'Bebas Neue',sans-serif; font-size: 28px; color: #888; }
    #progress-label { display: flex; justify-content: space-between; margin: 16px 0 6px; font-size: 12px; }
    #progress-label span:first-child { color: #aaa; }
    #progress-label span:last-child { color: #ffd700; }
    #progress-bar { background: rgba(255,255,255,0.07); border-radius: 99px; height: 8px; overflow: hidden; }
    #progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ff8c00); border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

    #tabs { display: flex; gap: 8px; margin-top: 20px; }
    .tab-btn { flex: 1; padding: 10px 0; border-radius: 10px; font-size: 13px; font-weight: 700; border: 1px solid #333; background: #1a1a2e; color: #666; cursor: pointer; font-family: 'Noto Sans JP'; transition: all 0.2s; }
    .tab-btn.active { background: #ffd700; color: #0a0a0f; border: none; }

    .panel { display: none; margin-top: 20px; }
    .panel.active { display: block; }

    .card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; color: #888; margin-bottom: 12px; }
    .card-title.gold { color: #ffd700; font-weight: 700; }

    #run-row { display: flex; gap: 10px; }
    #run-wrap { flex: 1; position: relative; }
    #run-input { width: 100%; background: #0a0a0f; border: 2px solid #333; border-radius: 10px; padding: 14px 50px 14px 16px; color: #fff; font-size: 28px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; outline: none; -webkit-appearance: none; }
    #run-km-label { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #555; font-family: 'Bebas Neue'; font-size: 18px; }
    #run-btn { background: #ffd700; color: #0a0a0f; border-radius: 10px; padding: 0 22px; font-size: 24px; font-weight: 900; cursor: pointer; border: none; font-family: 'Noto Sans JP'; }
    #run-btn:active { transform: scale(0.95); }

    #earned-title { font-size: 13px; color: #888; margin: 24px 0 12px; }
    .earned-card { background: linear-gradient(135deg, #1a2a1a, #1a3a1a); border: 1px solid rgba(76,175,80,0.27); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; animation: pulse 2s infinite; }
    .food-name { font-weight: 700; color: #7fff7f; font-size: 16px; }
    .food-km { font-size: 12px; color: #4ab87a; }
    #empty-earned { text-align: center; color: #444; padding: 30px; border: 1px dashed #222; border-radius: 12px; font-size: 13px; line-height: 1.8; }

    #goal-form-row1 { display: flex; gap: 8px; margin-bottom: 10px; }
    #emoji-input { width: 52px; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; font-size: 22px; text-align: center; outline: none; }
    #food-input { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; font-family: 'Noto Sans JP'; outline: none; }
    #goal-form-row2 { display: flex; gap: 8px; }
    #km-input-wrap { flex: 1; position: relative; }
    #km-goal-input { width: 100%; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; padding: 10px 36px 10px 14px; color: #fff; font-size: 14px; font-family: 'Noto Sans JP'; outline: none; -webkit-appearance: none; }
    #km-input-unit { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #555; font-size: 12px; }
    #add-goal-btn { background: #ffd700; color: #0a0a0f; border-radius: 8px; padding: 0 20px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; font-family: 'Noto Sans JP'; }
    #add-goal-btn:active { transform: scale(0.95); }

    .goal-item { border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(51,51,51,0.53); background: #1a1a2e; }
    .goal-item.earned { background: #1a2a1a; border-color: rgba(76,175,80,0.27); }
    .goal-name { font-weight: 700; }
    .goal-name.earned { color: #7fff7f; }
    .goal-km-text { font-family: 'Bebas Neue'; font-size: 20px; color: #ffd700; letter-spacing: 1px; }
    .goal-km-text.earned { color: #4caf50; }
    .mini-bar { background: rgba(255,255,255,0.07); border-radius: 99px; height: 4px; margin-top: 4px; overflow: hidden; }
    .mini-fill { height: 100%; background: #ffd700; border-radius: 99px; }
    .del-btn { background: rgba(255,255,255,0.07); color: #666; border: 1px solid #333; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP'; flex-shrink: 0; }
    .del-btn:active { background: #ff4444; color: #fff; }

    #reset-btn { width: 100%; margin-top: 20px; padding: 14px; background: transparent; border: 1px solid rgba(255,68,68,0.27); border-radius: 10px; color: #ff6666; font-size: 13px; cursor: pointer; font-family: 'Noto Sans JP'; }

    #log-title { font-size: 13px; color: #888; margin-bottom: 12px; }
    .log-item { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .log-km { font-family: 'Bebas Neue'; font-size: 28px; color: #ffd700; min-width: 60px; }
    .log-km span { font-size: 14px; color: #666; }
    .log-date { font-size: 12px; color: #666; }
    .log-num { font-size: 11px; color: #444; margin-left: auto; }
    #empty-log { text-align: center; color: #444; padding: 40px; border: 1px dashed #222; border-radius: 12px; }

    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 700; z-index: 100; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; animation: slideIn 0.3s ease; font-family: 'Noto Sans JP'; }

    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
    @keyframes slideIn { from{transform:translate(-50%,-20px);opacity:0} to{transform:translate(-50%,0);opacity:1} }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input::placeholder { color: #444; }
  </style>
</head>
<body>

<div id="header">
  <h1>RUN & EAT</h1>
  <p>走った分だけ食べていい</p>
</div>

<div id="main">
  <div id="km-card">
    <div id="km-label">🏃 累計走行距離</div>
    <div id="km-display">
      <span id="km-num">0.0</span>
      <span id="km-unit">KM</span>
    </div>
    <div id="progress-label">
      <span id="next-label">次の目標: —</span>
      <span id="next-remain">—</span>
    </div>
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('run')">🏃 記録</button>
    <button class="tab-btn" onclick="switchTab('goals')">🎯 目標</button>
    <button class="tab-btn" onclick="switchTab('log')">📋 履歴</button>
  </div>

  <!-- Run Panel -->
  <div id="panel-run" class="panel active">
    <div class="card">
      <div class="card-title">走った距離を入力</div>
      <div id="run-row">
        <div id="run-wrap">
          <input id="run-input" type="number" inputmode="decimal" placeholder="0.0" min="0" step="0.1" />
          <span id="run-km-label">KM</span>
        </div>
        <button id="run-btn" onclick="addRun()">＋</button>
      </div>
    </div>
    <div id="earned-title">🏆 獲得済みのご褒美</div>
    <div id="earned-list"></div>
  </div>

  <!-- Goals Panel -->
  <div id="panel-goals" class="panel">
    <div class="card">
      <div class="card-title gold">＋ 新しい目標を追加</div>
      <div id="goal-form-row1">
        <input id="emoji-input" type="text" placeholder="🍔" maxlength="2" />
        <input id="food-input" type="text" placeholder="食べ物の名前" />
      </div>
      <div id="goal-form-row2">
        <div id="km-input-wrap">
          <input id="km-goal-input" type="number" inputmode="decimal" placeholder="目標km" min="0.1" step="0.1" />
          <span id="km-input-unit">km</span>
        </div>
        <button id="add-goal-btn" onclick="addGoal()">追加</button>
      </div>
    </div>
    <div id="goals-list"></div>
    <button id="reset-btn" onclick="resetData()">🔄 データをリセット</button>
  </div>

  <!-- Log Panel -->
  <div id="panel-log" class="panel">
    <div id="log-title">直近30件の記録</div>
    <div id="log-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  const STORAGE_KEY = 'run-eat-app';
  const DEFAULT_GOALS = [
    { id: 1, km: 5,  food: 'ラーメン', emoji: '🍜', earned: false },
    { id: 2, km: 10, food: 'ピザ',     emoji: '🍕', earned: false },
    { id: 3, km: 21, food: '焼肉',     emoji: '🥩', earned: false },
  ];

  let state = { totalKm: 0, goals: JSON.parse(JSON.stringify(DEFAULT_GOALS)), logs: [] };
  let animKm = 0, animTimer = null;

  function load() {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) state = JSON.parse(s);
    } catch(e) {}
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function animateTo(target) {
    if (animTimer) clearInterval(animTimer);
    const start = animKm, diff = target - start;
    let i = 0;
    animTimer = setInterval(() => {
      i++;
      animKm = parseFloat((start + diff * (i / 30)).toFixed(2));
      document.getElementById('km-num').textContent = animKm.toFixed(1);
      if (i >= 30) { animKm = target; clearInterval(animTimer); }
    }, 16);
  }

  function render() {
    animateTo(state.totalKm);

    const next = state.goals.find(g => !g.earned);
    if (next) {
      const pct = Math.min((state.totalKm / next.km) * 100, 100);
      document.getElementById('next-label').textContent  = `次の目標: ${next.emoji} ${next.food} まで`;
      document.getElementById('next-remain').textContent = `${Math.max(0, next.km - state.totalKm).toFixed(1)}km`;
      document.getElementById('progress-fill').style.width = pct + '%';
    } else {
      document.getElementById('next-label').textContent  = '全目標達成！🎉';
      document.getElementById('next-remain').textContent = '';
      document.getElementById('progress-fill').style.width = '100%';
    }

    // Earned
    const earned = state.goals.filter(g => g.earned);
    document.getElementById('earned-list').innerHTML = earned.length === 0
      ? `<div id="empty-earned">まだ獲得していません<br>走って食べ物をゲットしよう！</div>`
      : earned.map(g => `
          <div class="earned-card">
            <span style="font-size:32px">${g.emoji}</span>
            <div><div class="food-name">${g.food}</div><div class="food-km">${g.km}km 達成 ✓</div></div>
            <span style="margin-left:auto;font-size:24px">✅</span>
          </div>`).join('');

    // Goals
    document.getElementById('goals-list').innerHTML = [...state.goals]
      .sort((a,b) => a.km - b.km)
      .map(g => {
        const pct = Math.min((state.totalKm / g.km) * 100, 100);
        return `
          <div class="goal-item ${g.earned ? 'earned' : ''}">
            <span style="font-size:28px">${g.emoji}</span>
            <div style="flex:1">
              <div class="goal-name ${g.earned ? 'earned' : ''}">${g.food}</div>
              <div class="goal-km-text ${g.earned ? 'earned' : ''}">${g.km} KM ${g.earned ? '✓' : ''}</div>
              ${!g.earned ? `<div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>` : ''}
            </div>
            <button class="del-btn" onclick="deleteGoal(${g.id})">削除</button>
          </div>`;
      }).join('');

    // Logs
    document.getElementById('log-list').innerHTML = state.logs.length === 0
      ? `<div id="empty-log">まだ記録がありません</div>`
      : state.logs.map((l, i) => `
          <div class="log-item">
            <div class="log-km">${l.km}<span>km</span></div>
            <div style="flex:1"><div class="log-date">${l.date} ${l.time}</div></div>
            <div class="log-num">#${state.logs.length - i}</div>
          </div>`).join('');
  }

  function addRun() {
    const val = parseFloat(document.getElementById('run-input').value);
    if (!val || val <= 0) return showToast('正しい距離を入力してください', 'error');
    const newTotal = parseFloat((state.totalKm + val).toFixed(2));
    const now = new Date();
    state.logs.unshift({
      id: Date.now(), km: val,
      date: now.toLocaleDateString('ja-JP'),
      time: now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' })
    });
    if (state.logs.length > 30) state.logs.pop();
    state.totalKm = newTotal;
    document.getElementById('run-input').value = '';

    const newly = state.goals.filter(g => !g.earned && newTotal >= g.km);
    newly.forEach(g => { state.goals.find(x => x.id === g.id).earned = true; });

    save();
    newly.length > 0
      ? showToast(`🎉 ${newly.map(g => g.food).join('・')} を獲得！`, 'reward')
      : showToast(`✅ ${val}km 追加しました！`);
    render();
  }

  function addGoal() {
    const km   = parseFloat(document.getElementById('km-goal-input').value);
    const food = document.getElementById('food-input').value.trim();
    const emoji = document.getElementById('emoji-input').value.trim() || '🍔';
    if (!km || !food) return showToast('距離と食べ物を入力してください', 'error');
    state.goals.push({ id: Date.now(), km, food, emoji, earned: state.totalKm >= km });
    document.getElementById('km-goal-input').value = '';
    document.getElementById('food-input').value    = '';
    document.getElementById('emoji-input').value   = '';
    save();
    showToast('目標を追加しました！');
    render();
  }

  function deleteGoal(id) {
    state.goals = state.goals.filter(g => g.id !== id);
    save();
    render();
  }

  function resetData() {
    if (!confirm('データをリセットしますか？')) return;
    state = { totalKm: 0, goals: JSON.parse(JSON.stringify(DEFAULT_GOALS)), logs: [] };
    animKm = 0;
    save();
    render();
  }

  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = type === 'reward' ? '#ffd700' : type === 'error' ? '#ff4444' : '#333';
    el.style.color = type === 'reward' ? '#0a0a0f' : '#fff';
    el.style.display = 'block';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'slideIn 0.3s ease';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', ['run','goals','log'][i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }

  load();
  render();
</script>
</body>
</html>
