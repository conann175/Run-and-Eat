<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おくすり手帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7a9e87;
    --sage-light: #a8c4b0;
    --sage-pale: #e8f0ea;
    --cream: #faf8f4;
    --warm-white: #f5f2ec;
    --text-dark: #2d3a31;
    --text-mid: #5a6b5e;
    --text-light: #8fa396;
    --accent: #c8845a;
    --accent-light: #f0d5c4;
    --checked: #4a8c6a;
    --checked-bg: #d4ede0;
    --shadow: rgba(60, 80, 65, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(122,158,135,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 80%, rgba(200,132,90,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  /* ── Header ── */
  header {
    padding: 32px 24px 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text-dark);
    letter-spacing: 0.06em;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.12em;
    margin-top: 4px;
  }
  .pill-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--sage), var(--sage-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 12px rgba(122,158,135,0.3);
  }

  /* ── Month Navigation ── */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 0 24px 16px;
  }
  .month-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px var(--shadow);
    color: var(--text-mid);
    font-size: 16px;
    transition: all 0.2s;
  }
  .month-btn:hover {
    background: var(--sage-pale);
    color: var(--sage);
    transform: scale(1.08);
  }
  .month-label {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-dark);
    min-width: 150px;
    text-align: center;
  }

  /* ── Calendar ── */
  .calendar-card {
    margin: 0 16px;
    background: white;
    border-radius: 24px;
    padding: 20px 16px;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
  }
  .weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-light);
    padding: 6px 0;
  }
  .weekday.sun { color: #c07070; }
  .weekday.sat { color: #7080c0; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    gap: 2px;
  }
  .day-cell:not(.empty):hover {
    background: var(--sage-pale);
    transform: scale(1.05);
  }
  .day-cell.empty { cursor: default; }

  .day-num {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1;
  }
  .day-cell.sunday .day-num { color: #c07070; }
  .day-cell.saturday .day-num { color: #7080c0; }
  .day-cell.other-month .day-num { color: #ccc; }

  .day-cell.today {
    background: var(--sage-pale);
  }
  .day-cell.today .day-num {
    font-weight: 700;
    color: var(--sage);
  }

  .day-cell.checked {
    background: var(--checked-bg);
  }
  .day-cell.checked .day-num {
    color: var(--checked);
    font-weight: 500;
  }

  .check-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--checked);
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .day-cell.checked .check-dot {
    opacity: 1;
    transform: scale(1);
  }

  .today-badge {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── Stats Bar ── */
  .stats-bar {
    margin: 16px 16px 0;
    background: white;
    border-radius: 20px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }
  .stat-item + .stat-item {
    border-left: 1px solid var(--sage-pale);
  }
  .stat-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--sage);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    margin-top: 4px;
  }
  .progress-bar {
    flex: 2;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 0.06em;
  }
  .progress-track {
    height: 8px;
    background: var(--sage-pale);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--sage-light));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ── Alarm Card ── */
  .alarm-card {
    margin: 16px 16px 0;
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .alarm-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .alarm-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alarm-title::before {
    content: '🔔';
    font-size: 16px;
  }

  .alarm-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .alarm-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--warm-white);
    border-radius: 14px;
    padding: 12px 14px;
    transition: all 0.2s;
  }
  .alarm-time {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-dark);
    flex: 1;
    letter-spacing: 0.04em;
  }
  .alarm-label-text {
    font-size: 11px;
    color: var(--text-light);
  }
  .alarm-toggle {
    width: 44px;
    height: 26px;
    border-radius: 13px;
    background: #ddd;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    border: none;
    outline: none;
    flex-shrink: 0;
  }
  .alarm-toggle.on { background: var(--sage); }
  .alarm-toggle::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .alarm-toggle.on::after { transform: translateX(18px); }

  .alarm-delete {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .alarm-delete:hover { background: #fee; color: #e77; }

  .add-alarm-btn {
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--sage-light);
    background: none;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--sage);
    letter-spacing: 0.06em;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .add-alarm-btn:hover {
    background: var(--sage-pale);
    border-color: var(--sage);
  }

  /* ── Modals ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 45, 35, 0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: white;
    border-radius: 28px;
    padding: 32px 28px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: translateY(20px) scale(0.95);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
  }
  .overlay.show .modal {
    transform: translateY(0) scale(1);
  }

  .modal-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
  }
  .modal-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }
  .modal-body {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .modal-date {
    display: inline-block;
    background: var(--sage-pale);
    color: var(--sage);
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 8px;
    font-size: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }
  .btn-cancel {
    background: var(--warm-white);
    color: var(--text-mid);
  }
  .btn-cancel:hover { background: #eee; }
  .btn-primary {
    background: linear-gradient(135deg, var(--sage), var(--sage-light));
    color: white;
    box-shadow: 0 4px 12px rgba(122,158,135,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(122,158,135,0.4); }
  .btn-danger {
    background: linear-gradient(135deg, #d97a6a, #e9997c);
    color: white;
    box-shadow: 0 4px 12px rgba(217,122,106,0.35);
  }
  .btn-danger:hover { transform: translateY(-1px); }

  /* ── Time Picker Modal ── */
  .time-picker {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
  }
  .time-input {
    font-family: 'Shippori Mincho', serif;
    font-size: 36px;
    font-weight: 600;
    width: 80px;
    text-align: center;
    border: 2px solid var(--sage-pale);
    border-radius: 16px;
    padding: 10px 4px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
    background: var(--warm-white);
  }
  .time-input:focus { border-color: var(--sage); background: white; }
  .time-sep {
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    color: var(--text-mid);
    margin-bottom: 4px;
  }
  .alarm-name-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--sage-pale);
    border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
    background: var(--warm-white);
    margin-bottom: 8px;
  }
  .alarm-name-input:focus { border-color: var(--sage); background: white; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-dark);
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 13px;
    letter-spacing: 0.06em;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 200;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div>
      <div class="header-title">おくすり手帳</div>
      <div class="header-sub">MEDICINE TRACKER</div>
    </div>
    <div class="pill-icon">💊</div>
  </header>

  <!-- Month Navigation -->
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Calendar -->
  <div class="calendar-card">
    <div class="weekdays">
      <div class="weekday sun">日</div>
      <div class="weekday">月</div>
      <div class="weekday">火</div>
      <div class="weekday">水</div>
      <div class="weekday">木</div>
      <div class="weekday">金</div>
      <div class="weekday sat">土</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="statChecked">0</div>
      <div class="stat-label">服薬済み</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statDays">0</div>
      <div class="stat-label">経過日数</div>
    </div>
    <div class="progress-bar">
      <div class="progress-label">
        <span>今月の服薬率</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Alarm Card -->
  <div class="alarm-card">
    <div class="alarm-header">
      <div class="alarm-title">服薬アラーム</div>
    </div>
    <div class="alarm-list" id="alarmList"></div>
    <button class="add-alarm-btn" onclick="openAddAlarm()">＋ アラームを追加</button>
  </div>
</div>

<!-- Uncheck Confirm Modal -->
<div class="overlay" id="uncheckOverlay">
  <div class="modal">
    <span class="modal-icon">🤔</span>
    <div class="modal-title">チェックを外しますか？</div>
    <div class="modal-body">
      <span class="modal-date" id="uncheckDate"></span><br>
      の服薬記録を削除します。
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeUncheck()">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmUncheck()">外す</button>
    </div>
  </div>
</div>

<!-- Add Alarm Modal -->
<div class="overlay" id="alarmOverlay">
  <div class="modal">
    <span class="modal-icon">⏰</span>
    <div class="modal-title">アラームを設定</div>
    <div class="time-picker">
      <input class="time-input" id="alarmHour" type="number" min="0" max="23" value="08">
      <span class="time-sep">:</span>
      <input class="time-input" id="alarmMin" type="number" min="0" max="59" value="00">
    </div>
    <input class="alarm-name-input" id="alarmName" type="text" placeholder="ラベル（例：朝の薬）">
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeAlarm()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveAlarm()">保存する</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let checkedDates = JSON.parse(localStorage.getItem('checkedDates') || '{}');
let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
let pendingUncheck = null;
let alarmTimers = [];

// ── Helpers ──
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function saveChecked() {
  localStorage.setItem('checkedDates', JSON.stringify(checkedDates));
}
function saveAlarms() {
  localStorage.setItem('alarms', JSON.stringify(alarms));
}
function showToast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Calendar ──
function renderCalendar() {
  const ml = document.getElementById('monthLabel');
  ml.textContent = `${viewYear}年 ${viewMonth + 1}月`;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const first = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();

  // Previous month days
  for (let i = first - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month empty';
    cell.innerHTML = `<span class="day-num">${prevDays - i}</span><div class="check-dot"></div>`;
    grid.appendChild(cell);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const key = dateKey(viewYear, viewMonth, d);
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const isToday = (viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate());
    const isChecked = !!checkedDates[key];

    let cls = 'day-cell';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    if (isToday) cls += ' today';
    if (isChecked) cls += ' checked';

    cell.className = cls;
    cell.innerHTML = `
      ${isToday ? '<div class="today-badge"></div>' : ''}
      <span class="day-num">${d}</span>
      <div class="check-dot"></div>
    `;
    cell.addEventListener('click', () => handleDayClick(d, key, cell));
    grid.appendChild(cell);
  }

  // Fill remaining cells
  const total = first + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month empty';
    cell.innerHTML = `<span class="day-num">${i}</span><div class="check-dot"></div>`;
    grid.appendChild(cell);
  }

  updateStats();
}

function handleDayClick(d, key, cell) {
  if (checkedDates[key]) {
    // Uncheck: confirm
    pendingUncheck = { key, cell };
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const dayNames = ['日','月','火','水','木','金','土'];
    document.getElementById('uncheckDate').textContent =
      `${viewYear}年${viewMonth+1}月${d}日（${dayNames[dow]}）`;
    document.getElementById('uncheckOverlay').classList.add('show');
  } else {
    // Check
    checkedDates[key] = true;
    saveChecked();
    cell.classList.add('checked');
    updateStats();
    showToast('✅ 服薬を記録しました');
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
}

// ── Uncheck Modal ──
function closeUncheck() {
  document.getElementById('uncheckOverlay').classList.remove('show');
  pendingUncheck = null;
}
function confirmUncheck() {
  if (!pendingUncheck) return;
  const { key, cell } = pendingUncheck;
  delete checkedDates[key];
  saveChecked();
  cell.classList.remove('checked');
  updateStats();
  closeUncheck();
  showToast('チェックを外しました');
}

// ── Stats ──
function updateStats() {
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  let checked = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    if (checkedDates[dateKey(viewYear, viewMonth, d)]) checked++;
  }

  // Elapsed days in month
  let elapsed = daysInMonth;
  if (viewYear === today.getFullYear() && viewMonth === today.getMonth()) {
    elapsed = today.getDate();
  } else if (viewYear > today.getFullYear() || (viewYear === today.getFullYear() && viewMonth > today.getMonth())) {
    elapsed = 0;
  }

  const pct = elapsed > 0 ? Math.round((checked / elapsed) * 100) : 0;

  document.getElementById('statChecked').textContent = checked;
  document.getElementById('statDays').textContent = elapsed;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

// ── Alarms ──
function renderAlarms() {
  const list = document.getElementById('alarmList');
  list.innerHTML = '';
  alarms.forEach((alarm, i) => {
    const item = document.createElement('div');
    item.className = 'alarm-item';
    item.innerHTML = `
      <div style="flex:1">
        <div class="alarm-time">${String(alarm.hour).padStart(2,'0')}:${String(alarm.min).padStart(2,'0')}</div>
        <div class="alarm-label-text">${alarm.label || '毎日'}</div>
      </div>
      <button class="alarm-toggle ${alarm.on ? 'on' : ''}" data-idx="${i}" onclick="toggleAlarm(${i})"></button>
      <button class="alarm-delete" onclick="deleteAlarm(${i})">×</button>
    `;
    list.appendChild(item);
  });
  scheduleAlarms();
}

function openAddAlarm() {
  document.getElementById('alarmHour').value = '08';
  document.getElementById('alarmMin').value = '00';
  document.getElementById('alarmName').value = '';
  document.getElementById('alarmOverlay').classList.add('show');
}
function closeAlarm() {
  document.getElementById('alarmOverlay').classList.remove('show');
}
function saveAlarm() {
  let h = parseInt(document.getElementById('alarmHour').value);
  let m = parseInt(document.getElementById('alarmMin').value);
  if (isNaN(h) || h < 0 || h > 23) h = 8;
  if (isNaN(m) || m < 0 || m > 59) m = 0;
  const label = document.getElementById('alarmName').value.trim() || '毎日';
  alarms.push({ hour: h, min: m, label, on: true });
  saveAlarms();
  renderAlarms();
  closeAlarm();
  showToast(`⏰ ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} にアラームを設定しました`);
  requestNotifPerm();
}
function toggleAlarm(i) {
  alarms[i].on = !alarms[i].on;
  saveAlarms();
  renderAlarms();
  showToast(alarms[i].on ? '🔔 アラームをオンにしました' : '🔕 アラームをオフにしました');
}
function deleteAlarm(i) {
  alarms.splice(i, 1);
  saveAlarms();
  renderAlarms();
  showToast('アラームを削除しました');
}

// ── Notification / Alarm ──
function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function scheduleAlarms() {
  alarmTimers.forEach(clearTimeout);
  alarmTimers = [];

  alarms.forEach(alarm => {
    if (!alarm.on) return;
    const now = new Date();
    let next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), alarm.hour, alarm.min, 0);
    if (next <= now) next.setDate(next.getDate() + 1);
    const delay = next - now;

    const t = setTimeout(() => {
      fireAlarm(alarm.label || '服薬の時間');
      // Reschedule for next day
      scheduleAlarms();
    }, delay);
    alarmTimers.push(t);
  });
}

function fireAlarm(label) {
  // Browser Notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('💊 ' + label, {
      body: '薬を飲む時間です！',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">💊</text></svg>'
    });
  }
  // In-app toast
  showToast(`🔔 ${label}の時間です！`, 5000);
  // Audio beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.3);
    });
  } catch(e) {}
}

// ── Init ──
renderCalendar();
renderAlarms();
requestNotifPerm();
</script>
